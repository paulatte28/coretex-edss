<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1800" width="1300" height="1800">
  <style>
    .actor-label { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; font-weight: bold; }
    .usecase { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .usecase-text { font-family: Arial, sans-serif; font-size: 10px; text-anchor: middle; dominant-baseline: middle; }
    .system-box { fill: #fafafa; stroke: #333; stroke-width: 2; }
    .system-title { font-family: Arial, sans-serif; font-size: 20px; text-anchor: middle; font-weight: bold; }
    .connector { stroke: #333; stroke-width: 1; fill: none; }
  </style>

  <!-- System Box -->
  <rect x="200" y="20" width="900" height="1760" class="system-box" rx="5"/>
  <text x="650" y="55" class="system-title">CORETEX EDSS</text>

  <!-- ==================== SYSTEM ADMINISTRATOR ==================== -->
  
  <!-- System Admin Actor -->
  <g transform="translate(80, 350)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="18" x2="0" y2="55" stroke="#333" stroke-width="2"/>
    <line x1="-22" y1="35" x2="22" y2="35" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="55" x2="-15" y2="85" stroke="#333" stroke-width="2"/>
