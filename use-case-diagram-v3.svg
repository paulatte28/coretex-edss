    <line x1="0" y1="18" x2="0" y2="55" stroke="#333" stroke-width="2"/>
    <line x1="-22" y1="35" x2="22" y2="35" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="55" x2="-15" y2="85" stroke="#333" stroke-width="2"/>
