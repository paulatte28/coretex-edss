  <line x1="98" y1="420" x2="325" y2="340" class="connector"/>
  <line x1="98" y1="420" x2="315" y2="400" class="connector"/>
  <line x1="98" y1="420" x2="295" y2="460" class="connector"/>
  <line x1="98" y1="420" x2="310" y2="520" class="connector"/>
  <line x1="98" y1="420" x2="290" y2="580" class="connector"/>
