  <line x1="1302" y1="280" x2="1080" y2="100" class="connector"/>
  <line x1="1302" y1="280" x2="1105" y2="160" class="connector"/>
  <line x1="1302" y1="280" x2="1095" y2="220" class="connector"/>
  <line x1="1302" y1="280" x2="1085" y2="280" class="connector"/>
  <line x1="1302" y1="280" x2="1085" y2="340" class="connector"/>
  <line x1="1302" y1="280" x2="1100" y2="400" class="connector"/>
  <line x1="1302" y1="280" x2="1105" y2="460" class="connector"/>

