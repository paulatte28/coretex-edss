  <text x="1000" y="100" class="usecase-text">Login / Logout</text>

  <ellipse cx="1000" cy="160" rx="105" ry="22" class="usecase"/>
  <text x="1000" y="160" class="usecase-text">Record POS Transaction</text>

  <ellipse cx="1000" cy="220" rx="95" ry="22" class="usecase"/>
  <text x="1000" y="220" class="usecase-text">Enter Product Name</text>

  <ellipse cx="1000" cy="280" rx="85" ry="22" class="usecase"/>
  <text x="1000" y="280" class="usecase-text">Enter Quantity</text>

  <ellipse cx="1000" cy="340" rx="85" ry="22" class="usecase"/>
  <text x="1000" y="340" class="usecase-text">Enter Unit Price</text>

  <ellipse cx="1000" cy="400" rx="100" ry="22" class="usecase"/>
  <text x="1000" y="400" class="usecase-text">View Daily Sales Summary</text>

  <ellipse cx="1000" cy="460" rx="105" ry="22" class="usecase"/>
  <text x="1000" y="460" class="usecase-text">View Transaction History</text>

