<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1900" width="1400" height="1900">
  <style>
    .actor-label { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; font-weight: bold; }
    .usecase { fill: #fff; stroke: #333; stroke-width: 1.5; }
    .usecase-text { font-family: Arial, sans-serif; font-size: 10px; text-anchor: middle; dominant-baseline: middle; }
    .system-box { fill: #fafafa; stroke: #333; stroke-width: 2; }
    .system-title { font-family: Arial, sans-serif; font-size: 20px; text-anchor: middle; font-weight: bold; }
    .connector { stroke: #333; stroke-width: 1; fill: none; }
    .section-label { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #666; }
  </style>

  <!-- System Box -->
  <rect x="200" y="20" width="1000" height="1860" class="system-box" rx="5"/>
  <text x="700" y="55" class="system-title">CORETEX EDSS</text>

  <!-- ==================== SYSTEM ADMINISTRATOR ==================== -->
  
  <!-- System Admin Actor -->
  <g transform="translate(80, 280)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="18" x2="0" y2="55" stroke="#333" stroke-width="2"/>
    <line x1="-22" y1="35" x2="22" y2="35" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="55" x2="-15" y2="85" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="55" x2="15" y2="85" stroke="#333" stroke-width="2"/>
    <text x="0" y="105" class="actor-label">System</text>
    <text x="0" y="120" class="actor-label">Administrator</text>
  </g>

  <!-- Admin Use Cases -->
  <ellipse cx="400" cy="100" rx="80" ry="22" class="usecase"/>
  <text x="400" y="100" class="usecase-text">Login / Logout</text>

  <ellipse cx="400" cy="160" rx="95" ry="22" class="usecase"/>
  <text x="400" y="160" class="usecase-text">Create User Account</text>

  <ellipse cx="400" cy="220" rx="100" ry="22" class="usecase"/>
  <text x="400" y="220" class="usecase-text">Manage User Accounts</text>

  <ellipse cx="400" cy="280" rx="95" ry="22" class="usecase"/>
  <text x="400" y="280" class="usecase-text">Reset User Password</text>

  <ellipse cx="400" cy="340" rx="90" ry="22" class="usecase"/>
  <text x="400" y="340" class="usecase-text">Assign User to Branch</text>

  <ellipse cx="400" cy="400" rx="105" ry="22" class="usecase"/>
  <text x="400" y="400" class="usecase-text">Configure KPI Thresholds</text>

  <ellipse cx="400" cy="460" rx="110" ry="22" class="usecase"/>
  <text x="400" y="460" class="usecase-text">Configure Report Schedule</text>

  <ellipse cx="400" cy="520" rx="120" ry="22" class="usecase"/>
  <text x="400" y="520" class="usecase-text">View Branch Submission Status</text>

  <ellipse cx="400" cy="580" rx="85" ry="22" class="usecase"/>
  <text x="400" y="580" class="usecase-text">View Activity Logs</text>

  <ellipse cx="400" cy="640" rx="80" ry="22" class="usecase"/>
  <text x="400" y="640" class="usecase-text">View Audit Trail</text>

  <!-- Admin Lines -->
  <line x1="98" y1="280" x2="320" y2="100" class="connector"/>
  <line x1="98" y1="280" x2="305" y2="160" class="connector"/>
  <line x1="98" y1="280" x2="300" y2="220" class="connector"/>
  <line x1="98" y1="280" x2="305" y2="280" class="connector"/>
  <line x1="98" y1="280" x2="310" y2="340" class="connector"/>
  <line x1="98" y1="280" x2="295" y2="400" class="connector"/>
